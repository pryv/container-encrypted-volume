name: ci

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Static checks (syntax + manifests + hygiene)
        run: |
          set -e
          for f in cev.sh entrypoint-wrapper.sh backends/*/backend.sh key-providers/*/provider.sh test/*.sh; do
            bash -n "$f"; echo "ok: $f"
          done
          ./test/validate-manifests.sh
      - name: LUKS conformance (privileged)
        run: |
          sudo modprobe dm_crypt
          docker run --rm --privileged -v "$PWD:/cev" -w /cev node:24-bookworm bash -c '
            apt-get update -qq && apt-get install -y -qq cryptsetup e2fsprogs openssl >/dev/null
            chmod +x cev.sh backends/*/backend.sh key-providers/*/provider.sh test/*.sh
            ./test/conformance.sh luks'
      - name: gocryptfs conformance (FUSE)
        run: |
          docker run --rm --cap-add SYS_ADMIN --device /dev/fuse --security-opt apparmor=unconfined \
            -v "$PWD:/cev" -w /cev node:24-bookworm bash -c '
            apt-get update -qq && apt-get install -y -qq gocryptfs fuse openssl >/dev/null
            chmod +x cev.sh backends/*/backend.sh key-providers/*/provider.sh test/*.sh
            ./test/conformance.sh gocryptfs' || echo "gocryptfs conformance skipped (runner FUSE policy)"

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/pryv/container-encrypted-volume
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
